name: desktop-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Linux ${{ matrix.arch }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev
      - name: Package
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          go mod download fyne.io/tools@v1.7.2
          TOOLS_DIR="$(go env GOMODCACHE)/fyne.io/tools@v1.7.2"
          chmod -R u+w "$TOOLS_DIR"
          # Fyne's hard-coded _FORTIFY_SOURCE conflicts with the current
          # Ubuntu/Go toolchain. Keep stack protection but remove that macro.
          sed -i 's/-D_FORTIFY_SOURCE=3 //' "$TOOLS_DIR/cmd/fyne/internal/commands/build.go"
          (cd "$TOOLS_DIR" && go install ./cmd/fyne)
          VERSION="${TAG_NAME#v}"
          export GOFLAGS="-ldflags=-X=github.com/iyear/tdl/app/desktop.Version=$VERSION"
          # The hosted Ubuntu image may predefine these flags. Fyne supplies
          # its own release hardening flags, including _FORTIFY_SOURCE.
          unset CGO_CFLAGS CGO_CPPFLAGS CFLAGS CPPFLAGS
          cd desktop
          fyne package --target linux --name TelegramDownloadBotDesktop --app-id com.connectingeverycorner.telegramdownloadbot --app-version "$VERSION" --icon ../assets/tdl-desktop-icon.png --release
          mkdir -p ../dist
          mkdir package
          tar -xJf TelegramDownloadBotDesktop.tar.xz -C package
          tar -czf "../dist/telegram-download-bot-desktop-linux-$ARCH.tar.gz" -C package .
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: dist/telegram-download-bot-desktop-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Package app
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          go install fyne.io/tools/cmd/fyne@v1.7.2
          VERSION="${TAG_NAME#v}"
          export GOFLAGS="-ldflags=-X=github.com/iyear/tdl/app/desktop.Version=$VERSION"
          cd desktop
          fyne package --target darwin --name TelegramDownloadBotDesktop --app-id com.connectingeverycorner.telegramdownloadbot --app-version "$VERSION" --icon ../assets/tdl-desktop-icon.png --release
          mkdir -p ../dist
          ditto -c -k --sequesterRsrc --keepParent TelegramDownloadBotDesktop.app "../dist/telegram-download-bot-desktop-macos-$ARCH.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          path: dist/telegram-download-bot-desktop-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  windows-amd64:
    name: Windows amd64 package
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Package
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          ARCH: amd64
          # This is the compiler that has already succeeded on windows-2022.
          CC: gcc
        run: |
          $ErrorActionPreference = 'Stop'
          go install fyne.io/tools/cmd/fyne@v1.7.2
          $version = $env:TAG_NAME.TrimStart('v')
          $env:GOFLAGS = "-ldflags=-X=github.com/iyear/tdl/app/desktop.Version=$version"
          Push-Location desktop
          fyne package --target windows --name TelegramDownloadBotDesktop --app-id com.connectingeverycorner.telegramdownloadbot --app-version $version --icon ../assets/tdl-desktop-icon.png --release
          if ($LASTEXITCODE -ne 0) { throw "Fyne package failed with exit code $LASTEXITCODE" }
          New-Item -ItemType Directory -Force ../dist | Out-Null
          Compress-Archive -Path TelegramDownloadBotDesktop.exe -DestinationPath "../dist/telegram-download-bot-desktop-windows-$env:ARCH.zip"
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-amd64
          path: dist/telegram-download-bot-desktop-windows-amd64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [linux, macos, windows-amd64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --target "$GITHUB_SHA" --title "Telegram Download Bot Desktop $TAG_NAME" --generate-notes
          fi
