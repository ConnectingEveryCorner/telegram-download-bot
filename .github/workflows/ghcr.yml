name: build-ghcr

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit_date=$(git show -s --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ inputs.image_tag }}
            COMMIT=${{ steps.image.outputs.commit }}
            COMMIT_DATE=${{ steps.image.outputs.commit_date }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.title=telegram-download-bot
            org.opencontainers.image.description=Telegram download-and-send-back bot
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
