start: |-
  /myid
  Show your chat id so an admin can authorize you

  /login
  Start Telegram account login

  /login +4475834875
  Start login with a phone number directly

  /status
  Check whether the current account is logged in

  /logout
  Clear the account session bound to this bot chat

  /cancel
  Cancel the current login flow

  /grant <chat_id>
  Primary admin authorizes a chat id to use the bot

  /revoke <chat_id>
  Primary admin revokes a chat id's access

  /users
  Primary admin views the current authorization status

  After login, send me a Telegram message link directly, for example:
  https://t.me/telegram/193
help: "https://github.com/ConnectingEveryCorner/telegram-download-bot"
