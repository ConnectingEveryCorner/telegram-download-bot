start: |-
  /myid
  查看你自己的 chat id，方便让管理员授权

  /login
  开始登录 Telegram 账号

  /login +4475834875
  直接带手机号开始登录

  /status
  查看当前账号是否已登录

  /logout
  清除当前 bot 会话绑定的账号登录信息

  /cancel
  取消当前登录流程

  /grant <chat_id>
  主管理员授权某个 chat id 使用机器人

  /revoke <chat_id>
  主管理员取消某个 chat id 的使用权限

  /users
  主管理员查看当前所有授权状态

  登录后，直接给我发 Telegram 消息链接，例如:
  https://t.me/telegram/193
